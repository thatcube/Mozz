name: Mozz
options:
  bundleIdPrefix: com.thatcube
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    MARKETING_VERSION: "2026.7.8"
    CURRENT_PROJECT_VERSION: "1"
    # Language mode 5 (toolchain is newer). Candidate B favours pragmatic,
    # high-performance code with opt-in Sendable/actors rather than repo-wide
    # Swift 6 strict concurrency (that is Candidate C's thesis).
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # Simulator builds need no signing; device builds set DEVELOPMENT_TEAM locally.
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

packages:
  MozzKit:
    path: .

targets:
  Mozz:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Mozz
    dependencies:
      - package: MozzKit
        product: MozzApp
      - target: MozzWidget
    entitlements:
      path: App/Mozz/Mozz.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.thatcube.Mozz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Mozz
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad (tvOS is a later, thin-UI target)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: App/Mozz/Info.plist
      properties:
        CFBundleDisplayName: Mozz
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: SplashBackground
          UIImageName: MozzLogo
          UIImageRespectsSafeAreaInsets: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # CRITICAL for a music app: keep audio playing in the background.
        UIBackgroundModes:
          - audio
        # Plex/Jellyfin servers are frequently self-hosted on the LAN over plain
        # HTTP; allow arbitrary + local-network loads. (A production build could
        # tighten this to per-host exceptions once a server is chosen.)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        # iOS 14+ requires a purpose string before touching the local network
        # (LAN server discovery / direct-play from a home server).
        NSLocalNetworkUsageDescription: "Mozz connects to Plex and Jellyfin media servers on your local network."
        NSBonjourServices:
          - _jellyfin._tcp
        # Custom URL scheme for deep links (mozz://album/<id>, mozz://tab/library,
        # …). Widget tiles and shared links open the app straight to a screen.
        CFBundleURLTypes:
          - CFBundleURLName: com.thatcube.Mozz
            CFBundleURLSchemes:
              - mozz
        # Handoff: activity types this app advertises/continues across devices.
        # Must be pre-declared or the OS won't route onContinueUserActivity.
        NSUserActivityTypes:
          - com.thatcube.mozz.album
          - com.thatcube.mozz.artist
          - com.thatcube.mozz.playlist
          - com.thatcube.mozz.genre
          - com.thatcube.mozz.library

  MozzWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/MozzWidget
    dependencies:
      - package: MozzKit
        product: MozzCore
    entitlements:
      path: App/MozzWidget/MozzWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.thatcube.Mozz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Mozz.widget
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: App/MozzWidget/Info.plist
      properties:
        CFBundleDisplayName: Mozz
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
